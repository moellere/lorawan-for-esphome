name: CI

on:
  push:
  pull_request:

jobs:
  compile:
    name: esphome compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Pin ESPHome: the C++ is built against a specific external API surface.
      - name: Install ESPHome
        run: pip install esphome==2026.6.1

      - name: Write placeholder secrets
        run: |
          cat > tests/secrets.yaml <<'EOF'
          dev_eui: "0011223344556677"
          join_eui: "0000000000000000"
          app_key: "00112233445566778899aabbccddeeff"
          EOF

      - name: Compile
        run: esphome compile tests/ci-compile.yaml
